<article class="card-shell group">
  <div class="flex flex-col gap-5 sm:flex-row sm:items-start sm:justify-between">
    <div class="flex items-start gap-4">
      <div [class]="'avatar ' + avatarColor">
        {{ initials }}
      </div>

      <div>
        <div class="flex flex-wrap items-center gap-2">
          <span
            class="inline-flex items-center rounded-full bg-slate-950 px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.25em] text-white"
          >
            {{ category }}
          </span>
          <span class="text-sm text-slate-500">{{ publishedAt }}</span>
        </div>

        <h2 class="mt-3 text-2xl font-bold tracking-tight text-slate-950 sm:text-[2rem]">
          {{ blogTitle }}
        </h2>
        <p class="mt-2 text-sm text-slate-500">by {{ author }} · {{ readTime }}</p>
      </div>
    </div>
  </div>

  <p class="mt-5 max-w-4xl text-base leading-7 text-slate-700 line-clamp-2">
    {{ blogContent }}
  </p>
  <div class="flex justify-between items-center mt-6">
    <div class="mt-6 flex flex-wrap gap-2">
      @for (tag of tags; track tag) {
        <span
          class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold uppercase tracking-[0.18em] text-slate-600"
        >
          {{ tag }}
        </span>
      }
    </div>
    <div class="flex items-center gap-4">
      <app-bookmark-button [blogId]="blogId" [isBookmarked]="isBookmarked"></app-bookmark-button>
      <a [href]="'/' + blogId">
        <button
          class="rounded-full cursor-pointer bg-purple-600 px-4 py-2 text-white transition hover:bg-purple-700 font-semibold"
        >
          Read More
        </button>
      </a>
    </div>
  </div>
</article>
