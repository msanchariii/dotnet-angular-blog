<article class="card-shell group" [class.bookmarked-card]="isBookmarked">
  <div class="flex flex-col gap-5 sm:flex-row sm:items-start sm:justify-between">
    <div class="flex items-start gap-4">
      <div [class]="'avatar ' + avatarColor">
        {{ initials }}
      </div>

      <div>
        <div class="flex flex-wrap items-center gap-2">
          <div
            class="inline-flex px-3 py-1 items-center rounded-full bg-slate-950 text-[11px] font-semibold uppercase tracking-[0.25em] text-white"
          >
            {{ category }}
          </div>
          <div
            class="px-3 py-1 text-[10px] rounded-full font-semibold uppercase tracking-[0.18em]"
            [class.hidden]="isPublished === null || isPublished === undefined"
            [class.text-green-600]="isPublished"
            [class.bg-green-100]="isPublished"
            [class.text-red-600]="!isPublished"
            [class.bg-red-100]="!isPublished"
          >
            {{
              isPublished === null || isPublished === undefined
                ? ''
                : isPublished
                  ? 'Published'
                  : 'Unpublished'
            }}
          </div>
          <span class="text-sm text-slate-500">{{ publishedAt }}</span>
        </div>

        <h2 class="mt-3 text-2xl font-bold tracking-tight text-slate-950 sm:text-[2rem]">
          {{ blogTitle }}
        </h2>
        <p class="mt-2 text-sm text-slate-500">by {{ author }} · {{ readTime }}</p>
      </div>
    </div>
  </div>

  <p
    [innerHTML]="blogContent"
    class="card-quill mt-5 max-w-7xl text-base leading-7 text-slate-700 line-clamp-5"
  ></p>
  <div class="flex justify-between items-center mt-6">
    <div class="mt-6 flex flex-wrap gap-2">
      @for (tag of tags; track tag) {
        <span
          class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold uppercase tracking-[0.18em] text-slate-600"
        >
          {{ tag }}
        </span>
      }
    </div>
    <div class="flex items-center gap-4">
      @if (showBookmarkButton) {
        <app-bookmark-button
          [blogId]="blogId"
          [isBookmarked]="isBookmarked"
          (bookmarkToggled)="onBookmarkToggled($event)"
        ></app-bookmark-button>
      }
      @if (isMyBlog) {
        <button
          class="cursor-pointer bg-blue-100 hover:bg-blue-200 text-blue-600 p-2 rounded-full"
          (click)="onEditClicked()"
          type="button"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-file-pen-line-icon lucide-file-pen-line"
          >
            <path
              d="M14.364 13.634a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506l4.013-4.009a1 1 0 0 0-3.004-3.004z"
            />
            <path d="M14.487 7.858A1 1 0 0 1 14 7V2" />
            <path
              d="M20 19.645V20a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l2.516 2.516"
            />
            <path d="M8 18h1" />
          </svg>
        </button>
        <button
          class="cursor-pointer bg-red-100 hover:bg-red-200 text-red-600 p-2 rounded-full"
          (click)="onDeleteClicked()"
          type="button"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-trash-icon lucide-trash"
          >
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
            <path d="M3 6h18" />
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
          </svg>
        </button>
      }
      <a (click)="viewBlog(blogId)">
        <button
          class="rounded-full cursor-pointer bg-purple-600 px-4 py-2 text-white transition hover:bg-purple-700 font-semibold"
        >
          Read More
        </button>
      </a>
    </div>
  </div>
</article>
