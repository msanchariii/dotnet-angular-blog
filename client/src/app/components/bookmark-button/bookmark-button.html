<button
  type="button"
  class="flex h-10 w-10 items-center justify-center rounded-full bg-white shadow-sm transition-all hover:scale-110 active:scale-95 border border-slate-200 cursor-pointer"
  [attr.aria-label]="isBookmarked ? 'Remove bookmark' : 'Add bookmark'"
  (click)="handleBookmarkClick()"
>
  <svg
    xmlns="http://www.w3.org/2000/svg"
    width="20"
    height="20"
    viewBox="0 0 24 24"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    [class]="isBookmarked ? 'fill-rose-600 stroke-rose-600' : 'fill-slate-600 stroke-slate-600'"
  >
    <path
      d="M17 3a2 2 0 0 1 2 2v15a1 1 0 0 1-1.496.868l-4.512-2.578a2 2 0 0 0-1.984 0l-4.512 2.578A1 1 0 0 1 5 20V5a2 2 0 0 1 2-2z"
    />
  </svg>
</button>
