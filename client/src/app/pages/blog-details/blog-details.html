<section class="details-page">
  <article class="card-shell">
    <header class="flex flex-col gap-5 sm:flex-row sm:items-start sm:justify-between">
      <div class="flex items-start gap-4">
        <div [class]="'avatar ' + avatarColor">
          {{ initials }}
        </div>

        <div>
          <div class="flex flex-wrap items-center gap-2">
            <span
              class="inline-flex items-center rounded-full bg-slate-950 px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.25em] text-white"
            >
              {{ blog?.categoryName }}
              <!-- {{ category }} -->
            </span>
            <span class="text-sm text-slate-500">{{ publishedAt }}</span>
          </div>

          <h1 class="mt-3 text-3xl font-bold tracking-tight text-slate-950 sm:text-4xl">
            {{ blog?.title }}
          </h1>
          <p class="mt-2 text-sm text-slate-500">by {{ blog?.authorName }} · {{ readTime }}</p>
        </div>
      </div>
    </header>

    <!-- <p class="mt-6 text-lg leading-8 text-slate-700">
      {{ intro }}
    </p> -->

    <!-- <div class="mt-8 space-y-7">
      @for (section of sections; track section.heading) {
        <section>
          <h2 class="text-2xl font-bold tracking-tight text-slate-900">{{ section.heading }}</h2>
          <p class="mt-3 text-base leading-8 text-slate-700">{{ section.body }}</p>
        </section>
      }
    </div> -->
    <div class="mt-8 space-y-7">
      <section>
        <p class="mt-3 text-base whitespace-pre-wrap leading-8 text-slate-700">
          {{ blog?.content }}
        </p>
      </section>
    </div>

    <!-- <section class="takeaway-box mt-8">
      <h3 class="text-base font-semibold uppercase tracking-[0.18em] text-slate-900">
        Key Takeaways
      </h3>
      <ul class="mt-3 space-y-2 text-slate-700">
        @for (item of takeaways; track item) {
          <li>• {{ item }}</li>
        }
      </ul>
    </section> -->

    <div class="mt-8 flex flex-wrap items-center justify-between gap-4">
      <div class="flex flex-wrap gap-2">
        @for (tag of tags; track tag) {
          <span
            class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold uppercase tracking-[0.18em] text-slate-600"
          >
            {{ tag }}
          </span>
        }
      </div>

      <button
        class="rounded-full cursor-pointer bg-purple-600 px-5 py-2 text-white transition hover:bg-purple-700 font-semibold"
      >
        Back To Feed
      </button>
    </div>
  </article>
</section>
