<div class="flex flex-col bg-purple-100 py-24 px-8">
  <form
    class="grid w-full grid-cols-1 md:grid-cols-4 max-w-5xl mx-auto gap-4"
    (ngSubmit)="applyFilters()"
  >
    <!-- Sort By -->
    <div class="flex w-full min-w-0 flex-col gap-2">
      <label for="sort" class="text-purple-900 font-semibold text-lg">Sort By</label>
      <p-select
        class="w-full"
        [options]="sortBy"
        [(ngModel)]="selectedSort"
        name="sortBy"
        optionLabel="label"
        optionValue="value"
        placeholder="Select Sort Order"
        [fluid]="true"
      />
    </div>
    <!-- Category -->
    <div class="flex w-full min-w-0 flex-col gap-2">
      <label for="category" class="text-purple-900 font-semibold text-lg">Category</label>
      <p-select
        class="w-full"
        [options]="categories"
        [(ngModel)]="selectedCategoryId"
        name="categoryId"
        optionLabel="categoryName"
        optionValue="categoryId"
        placeholder="Select a Category"
        [fluid]="true"
      />
    </div>
    <!-- Tags -->
    <div class="flex w-full min-w-0 flex-col gap-2">
      <label for="category" class="text-purple-900 font-semibold text-lg">Tags</label>
      <p-multiselect
        class="w-full"
        [options]="tags"
        [(ngModel)]="selectedTags"
        name="tags"
        optionLabel="name"
        placeholder="Select Tags"
        [maxSelectedLabels]="3"
        [fluid]="true"
      />
    </div>
    <!-- button -->
    <button
      type="submit"
      class="bg-purple-600 w-full text-white py-2 px-4 h-10 self-end font-semibold rounded hover:bg-purple-700"
    >
      Apply Filters
    </button>
  </form>
  <main>
    <div>
      @for (blog of blogData; track blog.blogId) {
        <app-blog-card
          [blogTitle]="blog.title"
          [blogContent]="blog.content"
          [category]="blog.categoryName"
          [author]="blog.authorName"
          [tags]="blog.tags"
          [avatarColor]="blog.avatarColor"
          [initials]="blog.initials"
          [readTime]="blog.readTime"
          [blogId]="blog.blogId"
          [isBookmarked]="blog.isBookmarked"
          (bookmarkChanged)="onBookmarkChanged($event)"
        ></app-blog-card>
      }
    </div>
  </main>
  <div class="card flex justify-center">
    <p-paginator
      (onPageChange)="onPageChange($event)"
      [first]="first"
      [rows]="rows"
      [totalRecords]="totalRecords"
      [rowsPerPageOptions]="[5, 10, 20, 50, 100]"
    />
  </div>
</div>
