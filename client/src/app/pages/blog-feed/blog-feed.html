<div class="flex flex-col bg-purple-100 py-24 px-8">
  <app-edit-blog></app-edit-blog>

  <form
    class="grid w-full grid-cols-1 md:grid-cols-4 max-w-5xl mx-auto gap-4"
    (ngSubmit)="applyFilters()"
  >
    <!-- Sort By -->
    <div class="flex w-full min-w-0 flex-col gap-2">
      <label for="sort" class="text-purple-900 font-semibold text-lg">Sort By</label>
      <p-select
        class="w-full"
        [options]="sortBy"
        [(ngModel)]="selectedSort"
        name="sortBy"
        optionLabel="label"
        optionValue="value"
        placeholder="Select Sort Order"
        [fluid]="true"
      />
    </div>
    <!-- Category -->
    <div class="flex w-full min-w-0 flex-col gap-2">
      <label for="category" class="text-purple-900 font-semibold text-lg">Category</label>
      <p-select
        class="w-full"
        [options]="categories"
        [(ngModel)]="selectedCategoryId"
        name="categoryId"
        optionLabel="categoryName"
        optionValue="categoryId"
        placeholder="Select a Category"
        [fluid]="true"
      />
    </div>
    <!-- Tags -->
    <div class="flex w-full min-w-0 flex-col gap-2">
      <label for="category" class="text-purple-900 font-semibold text-lg">Tags</label>
      <p-multiselect
        class="w-full"
        [options]="tags"
        [(ngModel)]="selectedTags"
        name="tags"
        optionLabel="name"
        placeholder="Select Tags"
        [maxSelectedLabels]="3"
        [fluid]="true"
      />
    </div>
    <!-- button -->
    <div class="flex gap-2 items-end">
      <button
        type="submit"
        class="bg-purple-600 grow w-full text-white py-2 px-4 h-10 self-end font-semibold rounded hover:bg-purple-700"
      >
        Apply Filters
      </button>
      <button
        (click)="resetFilters()"
        class="bg-white flex h-10 w-10 px-1 py-1 items-center justify-center rounded-full shadow-sm transition-all border border-pink-200 cursor-pointer"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide stroke-rose-600 stroke-2 w-4 h-4 lucide-rotate-ccw-icon lucide-rotate-ccw"
        >
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
      </button>
    </div>
  </form>
  <main>
    <div>
      @for (blog of blogData; track blog.blogId) {
        <app-blog-card
          [blogTitle]="blog.title"
          [blogContent]="blog.content"
          [category]="blog.categoryName"
          [author]="blog.authorName"
          [tags]="blog.tags"
          [avatarColor]="blog.avatarColor"
          [initials]="blog.initials"
          [readTime]="blog.readTime"
          [blogId]="blog.blogId"
          [isBookmarked]="blog.isBookmarked"
          (bookmarkChanged)="onBookmarkChanged($event)"
        ></app-blog-card>
      }
    </div>
  </main>
  <div class="card flex justify-center">
    <p-paginator
      (onPageChange)="onPageChange($event)"
      [first]="first"
      [rows]="rows"
      [totalRecords]="totalRecords"
      [rowsPerPageOptions]="[5, 10, 20, 50, 100]"
    />
  </div>
</div>
